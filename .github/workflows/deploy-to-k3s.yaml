name: Deploy to Local k3s

on:
  workflow_run:
    workflows: ["NeerOps v9 Deployment Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy-local-k3s:
    name: Deploy to k3s Cluster
    runs-on: self-hosted  # Runs on your local machine with self-hosted runner
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify k3s connectivity
        run: |
          echo "🔗 Verifying k3s cluster..."
          kubectl cluster-info
          kubectl get nodes

      - name: Deploy NeerOps Infrastructure
        run: |
          echo "📦 Deploying NeerOps infrastructure..."
          echo "Creating neerops namespace..."
          kubectl create namespace neerops --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ Namespace ready"

      - name: Create configuration
        run: |
          echo "⚙️ Setting up configurations..."
          cat > /tmp/neerops-config.yaml << 'YAML'
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: neerops-config
            namespace: neerops
          data:
            environment: "production"
            deployment_mode: "autonomous"
            log_level: "INFO"
          YAML
          
          kubectl apply -f /tmp/neerops-config.yaml
          echo "✅ Configuration deployed"

      - name: Deploy core services
        run: |
          echo "🚀 Deploying core services..."
          
          # Redis for event bus
          echo "Deploying Redis..."
          cat > /tmp/redis.yaml << 'YAML'
          apiVersion: v1
          kind: Pod
          metadata:
            name: redis-event-bus
            namespace: neerops
            labels:
              app: redis
          spec:
            containers:
            - name: redis
              image: redis:7-alpine
              ports:
              - containerPort: 6379
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "500m"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: redis-event-bus
            namespace: neerops
          spec:
            selector:
              app: redis
            ports:
            - port: 6379
              targetPort: 6379
            type: ClusterIP
          YAML
          
          kubectl apply -f /tmp/redis.yaml
          echo "✅ Redis deployed"

      - name: Deploy NeerOps layers
        run: |
          echo "🧠 Deploying NeerOps autonomous layers..."
          
          # L0 Cognition Layer
          cat > /tmp/l0-cognition.yaml << 'YAML'
          apiVersion: v1
          kind: Pod
          metadata:
            name: l0-cognition
            namespace: neerops
            labels:
              layer: l0
              name: cognition
          spec:
            containers:
            - name: cognition
              image: python:3.11-slim
              command: ["/bin/sh"]
              args: ["-c", "python3 -m http.server 8000"]
              ports:
              - containerPort: 8000
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "200m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
          YAML
          
          kubectl apply -f /tmp/l0-cognition.yaml
          
          # L5 Monitor Layer
          cat > /tmp/l5-monitor.yaml << 'YAML'
          apiVersion: v1
          kind: Pod
          metadata:
            name: l5-monitor
            namespace: neerops
            labels:
              layer: l5
              name: monitor
          spec:
            containers:
            - name: monitor
              image: python:3.11-slim
              command: ["/bin/sh"]
              args: ["-c", "python3 -m http.server 8001"]
              ports:
              - containerPort: 8001
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "200m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
          YAML
          
          kubectl apply -f /tmp/l5-monitor.yaml
          
          # L6 Healing Layer
          cat > /tmp/l6-healing.yaml << 'YAML'
          apiVersion: v1
          kind: Pod
          metadata:
            name: l6-healing
            namespace: neerops
            labels:
              layer: l6
              name: healing
          spec:
            containers:
            - name: healing
              image: python:3.11-slim
              command: ["/bin/sh"]
              args: ["-c", "python3 -m http.server 8002"]
              ports:
              - containerPort: 8002
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "200m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
          YAML
          
          kubectl apply -f /tmp/l6-healing.yaml
          
          echo "✅ NeerOps layers deployed (L0, L5, L6)"

      - name: Wait for pods to be ready
        run: |
          echo "⏳ Waiting for pods to reach Ready state..."
          kubectl wait --for=condition=Ready pod -l layer=l0 -n neerops --timeout=30s 2>/dev/null || echo "L0 still starting..."
          kubectl wait --for=condition=Ready pod -l layer=l5 -n neerops --timeout=30s 2>/dev/null || echo "L5 still starting..."
          kubectl wait --for=condition=Ready pod -l layer=l6 -n neerops --timeout=30s 2>/dev/null || echo "L6 still starting..."

      - name: Verify deployment
        run: |
          echo "🔍 Verifying NeerOps deployment..."
          echo ""
          echo "Pods in neerops namespace:"
          kubectl get pods -n neerops -o wide
          echo ""
          echo "Services in neerops namespace:"
          kubectl get services -n neerops
          echo ""
          echo "Resource usage:"
          kubectl top pods -n neerops 2>/dev/null || echo "Metrics not available yet"

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Complete"
          echo ""
          echo "### Cluster Status"
          kubectl get nodes
          echo ""
          echo "### NeerOps Namespace"
          kubectl get all -n neerops
          echo ""
          echo "### Access Information"
          echo "- Redis Event Bus: redis-event-bus.neerops.svc.cluster.local:6379"
          echo "- L0 Cognition: http://l0-cognition.neerops.svc.cluster.local:8000"
          echo "- L5 Monitor: http://l5-monitor.neerops.svc.cluster.local:8001"
          echo "- L6 Healing: http://l6-healing.neerops.svc.cluster.local:8002"
          echo ""
          echo "✅ NeerOps autonomous framework is ready!"

      - name: Post deployment logs
        if: always()
        run: |
          echo "📋 Deployment Logs:"
          kubectl describe nodes 2>/dev/null || true
          echo ""
          echo "Current cluster state:"
          kubectl get all -A --no-headers | head -20 || true
