apiVersion: v1
kind: Namespace
metadata:
  name: test-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-flask-app
  namespace: test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-flask-app
  template:
    metadata:
      labels:
        app: python-flask-app
        version: "1.0"
    spec:
      containers:
      - name: flask-app
        image: python:3.11-alpine
        command: ["/bin/sh", "-c"]
        args:
          - |
            pip install Flask==3.0.0 && \
            cat > /app/app.py << 'APPEOF'
            import os, json, logging, time
            from datetime import datetime
            from flask import Flask, jsonify, request
            from functools import wraps
            
            app = Flask(__name__)
            logging.basicConfig(level=logging.INFO)
            logger = logging.getLogger(__name__)
            
            metrics = {'requests_total': 0, 'requests_success': 0, 'requests_error': 0, 'avg_response_time': 0, 'response_times': []}
            users_db = [{'id': 1, 'name': 'Alice', 'email': 'alice@example.com'}, {'id': 2, 'name': 'Bob', 'email': 'bob@example.com'}]
            
            def track_metrics(f):
                @wraps(f)
                def decorated_function(*args, **kwargs):
                    start_time = time.time()
                    metrics['requests_total'] += 1
                    try:
                        result = f(*args, **kwargs)
                        metrics['requests_success'] += 1
                        return result
                    except Exception as e:
                        metrics['requests_error'] += 1
                        raise
                    finally:
                        elapsed = (time.time() - start_time) * 1000
                        metrics['response_times'].append(elapsed)
                        if len(metrics['response_times']) > 100:
                            metrics['response_times'] = metrics['response_times'][-100:]
                        if metrics['response_times']:
                            metrics['avg_response_time'] = sum(metrics['response_times']) / len(metrics['response_times'])
                return decorated_function
            
            @app.route('/', methods=['GET'])
            @track_metrics
            def index():
                return '<h1>🐍 NeerOps Python Flask App</h1><p>Kubernetes Deployment Test</p>', 200
            
            @app.route('/health', methods=['GET'])
            @track_metrics
            def health():
                return jsonify({'status': 'healthy', 'timestamp': datetime.utcnow().isoformat()}), 200
            
            @app.route('/ready', methods=['GET'])
            @track_metrics
            def readiness():
                return jsonify({'ready': True, 'version': '1.0'}), 200
            
            @app.route('/metrics', methods=['GET'])
            @track_metrics
            def get_metrics():
                error_rate = (metrics['requests_error'] / metrics['requests_total'] * 100) if metrics['requests_total'] > 0 else 0
                return jsonify({'requests': metrics['requests_total'], 'errors': metrics['requests_error'], 'error_rate': round(error_rate, 2), 'avg_response_ms': round(metrics['avg_response_time'], 2)}), 200
            
            @app.route('/api/users', methods=['GET'])
            @track_metrics
            def users():
                return jsonify(users_db), 200
            
            if __name__ == '__main__':
                logger.info("Starting Flask app on port 5000")
                app.run(host='0.0.0.0', port=5000, debug=False)
            APPEOF
            python /app/app.py
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: python-flask-app
  namespace: test-app
  labels:
    app: python-flask-app
spec:
  type: LoadBalancer
  selector:
    app: python-flask-app
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: test-app
data:
  environment: "test"
  version: "1.0"
